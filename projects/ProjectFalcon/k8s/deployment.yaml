apiVersion: apps/v1
kind: Deployment
metadata:
  name: juntos-alpha
  namespace: juntos
  labels:
    app: juntos-alpha
spec:
  replicas: 1
  selector:
    matchLabels:
      app: juntos-alpha
  template:
    metadata:
      labels:
        app: juntos-alpha
    spec:
      serviceAccountName: juntos-alpha
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
      containers:
      - name: app
        image: gcr.io/project-falcon-490804/juntos-alpha:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          value: "8080"
        - name: SERVER_ADDRESS
          value: "0.0.0.0"
        envFrom:
        - configMapRef:
            name: juntos-alpha-config
        - secretRef:
            name: juntos-alpha-secrets
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "512Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
