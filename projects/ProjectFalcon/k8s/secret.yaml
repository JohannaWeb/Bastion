apiVersion: v1
kind: Secret
metadata:
  name: juntos-alpha-secrets
  namespace: juntos
  labels:
    app: juntos-alpha
type: Opaque
stringData:
  # Database credentials - update these in production
  DB_USERNAME: sa
  DB_PASSWORD: password
  # Add any additional secrets here (API keys, tokens, etc.)
  # JWT_SECRET: "change-me-in-production"
  # API_KEY: "your-api-key-here"
