apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: juntos-alpha
  namespace: juntos
  labels:
    app: juntos-alpha
rules:
# ConfigMap access for reloading configuration
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
# Secret access
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
# Pod access for debugging/logs
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list"]
