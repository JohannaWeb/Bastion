apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: juntos-alpha
  namespace: juntos
  annotations:
    kubernetes.io/ingress.class: "gce"
    networking.gke.io/managed-certificates: "juntos-nip-cert"
    # GCE health check configuration
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"ports": {"80":"juntos-backend-config"}}'
spec:
  rules:
  - host: 34.160.170.172.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: juntos-alpha
            port:
              number: 80
