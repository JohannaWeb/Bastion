version: "3.9"

networks:
  juntos-net:
    driver: bridge

services:
  # ─── Falcon Alpha Backend ────────────────────────────────────────────────────
  juntos-backend:
    build:
      context: .
      target: gateway
    container_name: juntos-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - juntos-net

  juntos-web:
    build:
      context: ./juntos-web
      args:
        - VITE_BACKEND_URL=https://projectfalcon-production.up.railway.app
    container_name: juntos-web
    ports:
      - "3000:80"
    networks:
      - juntos-net
