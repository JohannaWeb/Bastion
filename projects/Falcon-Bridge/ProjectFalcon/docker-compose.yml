networks:
  falcon-net:
    driver: bridge

volumes:
  postgres-data:

services:
  # ─── Core Backend (Monolith) ──────────────────────────────────────────────────
  falcon-alpha:
    build:
      context: .
      target: alpha
    container_name: falcon-alpha
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/falcon
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=falcon
    networks:
      - falcon-net
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Web Frontend ─────────────────────────────────────────────────────────────
  falcon-web:
    build:
      context: ./falcon-web
    container_name: falcon-web
    ports:
      - "3000:80"
    networks:
      - falcon-net

  # ─── Persistence ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: falcon-postgres
    environment:
      - POSTGRES_DB=falcon
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=falcon
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - falcon-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d falcon"]
      interval: 5s
      timeout: 5s
      retries: 5
