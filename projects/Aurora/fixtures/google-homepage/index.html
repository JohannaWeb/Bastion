<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Google</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <nav class="top-links">
        <a href="#">Gmail</a>
        <a href="#">Images</a>
        <a href="#" class="app-link">Apps</a>
        <a href="#" class="sign-in">Sign-in</a>
      </nav>
    </header>

    <main class="hero">
      <h1 class="logo" aria-label="Google">
        <span class="g-blue">G</span><span class="g-red">o</span><span class="g-yellow">o</span><span class="g-blue">g</span><span class="g-green">l</span><span class="g-red">e</span>
      </h1>
      <div class="search-shell">
        <span class="search-icon">Q</span>
        <input class="search-input" type="text" placeholder="Search Google or type a URL">
      </div>
      <div class="actions">
        <button>Google Search</button>
        <button>I'm Feeling Lucky</button>
      </div>
      <p class="tagline">Static Aurora fixture for Google homepage rendering.</p>
    </main>

    <footer class="footer">
      <div class="footer-row">
        <span>United States</span>
      </div>
      <div class="footer-row footer-links">
        <a href="#">Advertising</a>
        <a href="#">Business</a>
        <a href="#">How Search works</a>
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Settings</a>
      </div>
    </footer>
  </body>
</html>
